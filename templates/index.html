<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Vuelos BFS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 40px;
        }

        h1 {
            color: white;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 220px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        .resultado {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }

        .error {
            margin-top: 20px;
            font-size: 18px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>Búsqueda de vuelos con BFS</h1>

    <div class="container">

        <form method="POST">

            <label><b>Ciudad inicio:</b></label><br>
            <input type="text" name="inicio" placeholder="Ej: Jiloyork" required><br>

            <label><b>Ciudad destino:</b></label><br>
            <input type="text" name="destino" placeholder="Ej: Zacatecas" required><br>

            <button type="submit">🔍 Buscar ruta</button>

        </form>

        <!-- RESULTADOS -->
        {% if resultado %}

            {% if resultado == "Ciudad no válida" or resultado == "No hay ruta disponible" %}
                <div class="error">
                    {{ resultado }}
                </div>
            {% else %}
                <div class="resultado">
                    <h2>Ruta encontrada:</h2>
                    <p>
                        {% for ciudad in resultado %}
                            {{ ciudad }}{% if not loop.last %} → {% endif %}
                        {% endfor %}
                    </p>
                </div>
            {% endif %}

        {% endif %}

    </div>

</body>
</html>
